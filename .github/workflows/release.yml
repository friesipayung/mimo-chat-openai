name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## mimo-chat-openai v0.0.1

            OpenAI-compatible API proxy for Xiaomi MiMo web interface.

            ### Features

            - **OpenAI-compatible API** — `/v1/chat/completions` endpoint
            - **Streaming** — Real-time token streaming
            - **Thinking/Reasoning** — Chain-of-thought extraction
            - **Multimodal** — Image, audio, video support (URL & base64)
            - **Web Search** — Real-time internet search via `tools` parameter
            - **Structured Output** — JSON mode via `response_format`
            - **API Key Management** — Multiple keys with enable/disable
            - **Cookie Management** — Balance check, health check, bulk import
            - **Web UI** — Dashboard, logs, config, API keys management
            - **Docker** — Single container deployment

            ### Docker Images

            ```bash
            # Pull latest
            docker pull ghcr.io/friesipayung/mimo-chat-openai:latest

            # Or specific version
            docker pull ghcr.io/friesipayung/mimo-chat-openai:0.0.1
            ```

            ### Quick Start

            ```bash
            docker compose up -d
            ```

            Open http://localhost:8090/ui/ — Password: `12345678`

            ### Environment Variables

            | Variable | Default | Description |
            |----------|---------|-------------|
            | `LISTEN` | `:8090` | Listen address |
            | `HOSTNAME` | `http://localhost:8090` | Base URL for API |
            | `ADMIN_PASSWORD` | `12345678` | Web UI password |
            | `DB_PATH` | `/data/mimo.db` | SQLite database path |

            ### Supported Platforms

            - `linux/amd64`
            - `linux/arm64`

            ---

            **⚠️ EXPERIMENTAL & EDUCATIONAL PURPOSE ONLY**

            Not affiliated with Xiaomi. Use at your own risk.
