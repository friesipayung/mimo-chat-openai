services:
  mimo-proxy:
    image: ghcr.io/friesipayung/mimo-chat-openai:latest
    # Uncomment below to build locally instead
    # build: .
    ports:
      - "8090:8090"
    volumes:
      - ./data:/data
    environment:
      - ADMIN_PASSWORD=12345678
      - LISTEN=:8090
      - HOSTNAME=http://localhost:8090
      - DB_PATH=/data/mimo.db
    restart: unless-stopped
